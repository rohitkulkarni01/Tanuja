<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    overflow: hidden;
    text-align: center;
    color: #fff;
}

/* Title */
h1 {
    margin-top: 100px;
    font-size: 3rem;
    animation: fadeIn 2s ease-in-out;
}

/* Text */
p {
    font-size: 1.3rem;
    margin: 20px;
    animation: fadeIn 3s ease-in-out;
}

/* Button */
button {
    padding: 15px 25px;
    font-size: 1rem;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff6b81;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Floating hearts */
.heart {
    position: absolute;
    color: rgba(255,255,255,0.7);
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Fade */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* BIG HEART (UPDATED SIZE) */
.big-heart {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 200px; /* 🔥 BIGGER */
    text-align: center;
    animation: popHeart 0.8s ease forwards;
    z-index: 10;
}

/* Text inside heart */
.heart-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20px;
    width: 300px;
    color: white;
    line-height: 1.5;
}

/* Pop animation */
@keyframes popHeart {
    0% { transform: translate(-50%, -50%) scale(0); }
    70% { transform: translate(-50%, -50%) scale(1.2); }
    100% { transform: translate(-50%, -50%) scale(1); }
}

</style>
</head>

<body>

<h1>Hey Tanu 💖</h1>

<p>
I know you're not feeling great right now...<br>
But I just want you to know,<br>
You're strong, amazing, and I'm here for you 🌸
</p>

<button id="surpriseBtn" onclick="showMessage()">Click for a Surprise 💌</button>

<script>

// 💖 SHOW HEART + HIDE BUTTON
function showMessage() {

    // Hide button
    document.getElementById("surpriseBtn").style.display = "none";

    // Create heart
    const heart = document.createElement("div");
    heart.classList.add("big-heart");

    heart.innerHTML = `
        💖
        <div class="heart-text">
            You deserve all the comfort,<br>
            warmth, and love ❤️<br><br>
            Take rest... I'm always here 😊
        </div>
    `;

    document.body.appendChild(heart);
}


// 💖 FLOATING HEARTS BACKGROUND
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
